<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../tailwind.min.css">
    <script defer src="../syncer.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #a8a8a8 0%, #8a8a8a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100vh;
            justify-content: center;
            position: relative;
        }

        .windshield-wrapper {
            position: relative;
            width: 90%;
            max-width: 600px;
            aspect-ratio: 2.2 / 1;
            perspective: 800px;
        }

        .windshield {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                #e8eaec 0%,
                #d8dadc 20%,
                #c8cacc 40%,
                #b8babc 70%,
                #a8aaac 100%);
            border-radius: 40% 40% 10% 10% / 20% 20% 5% 5%;
            box-shadow: 
                inset 0 10px 40px rgba(255, 255, 255, 0.4),
                inset 0 -15px 30px rgba(0, 0, 0, 0.1),
                0 20px 50px rgba(0, 0, 0, 0.3),
                0 5px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: visible;
            transform: rotateX(15deg);
            transform-style: preserve-3d;
        }

        .windshield::before {
            content: '';
            position: absolute;
            top: 5%;
            left: 10%;
            width: 40%;
            height: 30%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.35) 0%, transparent 60%);
            border-radius: 50%;
            pointer-events: none;
        }

        .windshield::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 5%;
            right: 5%;
            height: 12px;
            background: linear-gradient(180deg, #606468 0%, #484c50 100%);
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .wiper-base {
            position: absolute;
            bottom: -2px;
            width: 16px;
            height: 16px;
            background: radial-gradient(circle at 30% 30%, #4a4a4a 0%, #1a1a1a 100%);
            border-radius: 50%;
            z-index: 15;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
        }

        .wiper-base.left {
            left: 35%;
        }

        .wiper-base.right {
            right: 35%;
        }

        .wiper-arm {
            position: absolute;
            bottom: 5px;
            width: 4px;
            height: 45%;
            background: linear-gradient(90deg, #1a1a1a 0%, #404040 30%, #2a2a2a 70%, #1a1a1a 100%);
            transform-origin: bottom center;
            z-index: 10;
            border-radius: 2px;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.4);
        }

        .wiper-arm.left {
            left: 35.5%;
            transform: rotate(-50deg);
        }

        .wiper-arm.right {
            right: 35.5%;
            transform: rotate(50deg);
        }

        .wiper-blade {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) rotate(90deg);
            width: 100px;
            height: 6px;
            background: linear-gradient(180deg, #2a2a2a 0%, #505050 30%, #3a3a3a 70%, #1a1a1a 100%);
            border-radius: 3px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .wiper-blade::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 10px;
            background: #2a2a2a;
            border-radius: 2px;
        }

        .wiper-blade::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 2%;
            right: 2%;
            height: 2px;
            background: #0a0a0a;
            border-radius: 0 0 2px 2px;
        }

        .wiper-arm.off {
            animation: none;
        }

        .wiper-arm.left.slow { animation: wipe-left-3d 3s ease-in-out infinite; }
        .wiper-arm.right.slow { animation: wipe-right-3d 3s ease-in-out infinite; }

        .wiper-arm.left.medium { animation: wipe-left-3d 1.6s ease-in-out infinite; }
        .wiper-arm.right.medium { animation: wipe-right-3d 1.6s ease-in-out infinite; }

        .wiper-arm.left.fast { animation: wipe-left-3d 0.7s ease-in-out infinite; }
        .wiper-arm.right.fast { animation: wipe-right-3d 0.7s ease-in-out infinite; }

        .wiper-arm.left.interval { animation: wipe-left-interval-3d 4s ease-in-out infinite; }
        .wiper-arm.right.interval { animation: wipe-right-interval-3d 4s ease-in-out infinite; }

        .wiper-arm.left.rain_sensor { animation: wipe-left-3d 2s ease-in-out infinite; }
        .wiper-arm.right.rain_sensor { animation: wipe-right-3d 2s ease-in-out infinite; }

        @keyframes wipe-left-3d {
            0%, 100% { transform: rotate(-50deg); }
            50% { transform: rotate(45deg); }
        }

        @keyframes wipe-right-3d {
            0%, 100% { transform: rotate(50deg); }
            50% { transform: rotate(-45deg); }
        }

        @keyframes wipe-left-interval-3d {
            0%, 70%, 100% { transform: rotate(-50deg); }
            85% { transform: rotate(45deg); }
        }

        @keyframes wipe-right-interval-3d {
            0%, 70%, 100% { transform: rotate(50deg); }
            85% { transform: rotate(-45deg); }
        }

        .status-display {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.9);
            padding: 10px 24px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4b5563;
            transition: all 0.3s ease;
        }

        .status-dot.active {
            background: #22c55e;
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.7);
        }

        .status-text {
            color: white;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            min-width: 70px;
            text-align: center;
        }

        .speed-bars {
            display: flex;
            gap: 3px;
            align-items: flex-end;
        }

        .speed-bar {
            width: 5px;
            background: #374151;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .speed-bar:nth-child(1) { height: 8px; }
        .speed-bar:nth-child(2) { height: 13px; }
        .speed-bar:nth-child(3) { height: 18px; }

        .speed-bar.active {
            background: #22c55e;
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
        }

        .rain-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            border-radius: 40% 40% 10% 10% / 20% 20% 5% 5%;
        }

        .rain-drop {
            position: absolute;
            width: 2px;
            height: 15px;
            background: linear-gradient(180deg, transparent, rgba(200, 220, 255, 0.6));
            border-radius: 50%;
        }

        @keyframes rain-fall {
            0% { transform: translateY(-20px); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(200px); opacity: 0; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="windshield-wrapper">
            <div class="windshield">
                <div id="rain-container" class="rain-container"></div>
                <div class="wiper-base left"></div>
                <div class="wiper-base right"></div>
                <div id="wiper-left" class="wiper-arm left off">
                    <div class="wiper-blade"></div>
                </div>
                <div id="wiper-right" class="wiper-arm right off">
                    <div class="wiper-blade"></div>
                </div>
            </div>
        </div>

        <div class="status-display">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text" class="status-text">OFF</span>
            <div class="speed-bars">
                <div id="bar1" class="speed-bar"></div>
                <div id="bar2" class="speed-bar"></div>
                <div id="bar3" class="speed-bar"></div>
            </div>
        </div>
    </div>

    <script>
        let interval = null;
        const wiperLeft = document.getElementById('wiper-left');
        const wiperRight = document.getElementById('wiper-right');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const rainContainer = document.getElementById('rain-container');
        const bar1 = document.getElementById('bar1');
        const bar2 = document.getElementById('bar2');
        const bar3 = document.getElementById('bar3');

        let API_NAME = "Vehicle.Body.Windshield.Front.Wiping.Mode";
        let lastValue = null;

        function createRainDrops() {
            rainContainer.innerHTML = '';
            for (let i = 0; i < 50; i++) {
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.animationDelay = Math.random() * 2 + 's';
                drop.style.animationDuration = (0.4 + Math.random() * 0.4) + 's';
                drop.style.animation = `rain-fall ${0.4 + Math.random() * 0.4}s linear infinite`;
                drop.style.animationDelay = Math.random() * 2 + 's';
                rainContainer.appendChild(drop);
            }
        }

        function setWiperMode(mode) {
            if (!wiperLeft || !wiperRight || !statusText || !statusDot) return;
            
            const m = (mode || 'OFF').toString().toUpperCase().replace(/-/g, '_');
            
            console.log('[3D Wiper Widget] Setting mode:', m);
            
            wiperLeft.className = 'wiper-arm left';
            wiperRight.className = 'wiper-arm right';
            bar1.classList.remove('active');
            bar2.classList.remove('active');
            bar3.classList.remove('active');
            
            if (m === 'OFF') {
                wiperLeft.classList.add('off');
                wiperRight.classList.add('off');
                statusText.textContent = 'OFF';
                statusDot.classList.remove('active');
                rainContainer.style.opacity = '0';
            } else if (m === 'SLOW') {
                wiperLeft.classList.add('slow');
                wiperRight.classList.add('slow');
                statusText.textContent = 'SLOW';
                statusDot.classList.add('active');
                bar1.classList.add('active');
                rainContainer.style.opacity = '0.3';
            } else if (m === 'MEDIUM') {
                wiperLeft.classList.add('medium');
                wiperRight.classList.add('medium');
                statusText.textContent = 'MEDIUM';
                statusDot.classList.add('active');
                bar1.classList.add('active');
                bar2.classList.add('active');
                rainContainer.style.opacity = '0.5';
            } else if (m === 'FAST') {
                wiperLeft.classList.add('fast');
                wiperRight.classList.add('fast');
                statusText.textContent = 'FAST';
                statusDot.classList.add('active');
                bar1.classList.add('active');
                bar2.classList.add('active');
                bar3.classList.add('active');
                rainContainer.style.opacity = '0.8';
            } else if (m === 'INTERVAL') {
                wiperLeft.classList.add('interval');
                wiperRight.classList.add('interval');
                statusText.textContent = 'INTERVAL';
                statusDot.classList.add('active');
                bar1.classList.add('active');
                rainContainer.style.opacity = '0.2';
            } else if (m === 'RAIN_SENSOR') {
                wiperLeft.classList.add('rain_sensor');
                wiperRight.classList.add('rain_sensor');
                statusText.textContent = 'AUTO';
                statusDot.classList.add('active');
                bar1.classList.add('active');
                bar2.classList.add('active');
                rainContainer.style.opacity = '0.4';
            } else {
                wiperLeft.classList.add('off');
                wiperRight.classList.add('off');
                statusText.textContent = m || 'OFF';
                statusDot.classList.remove('active');
                rainContainer.style.opacity = '0';
            }
        }

        function processValue(rawValue) {
            if (rawValue !== undefined && rawValue !== null && rawValue !== lastValue) {
                console.log('[3D Wiper Widget] Value changed from', lastValue, 'to', rawValue);
                lastValue = rawValue;
                setWiperMode(rawValue);
            }
        }

        function onWidgetLoaded(options) {
            API_NAME = options.api || "Vehicle.Body.Windshield.Front.Wiping.Mode";
            console.log('[3D Wiper Widget] Initialized with API:', API_NAME);
            
            createRainDrops();
            setWiperMode('OFF');

            interval = setInterval(() => {
                const rawValue = getApiValue(API_NAME);
                processValue(rawValue);
            }, options.dataUpdateInterval || 200);
        }

        function onVssSync(data) {
            if (data && data[API_NAME] !== undefined) {
                processValue(data[API_NAME]);
            }
        }

        function onWidgetUnloaded(options) {
            if (interval) clearInterval(interval);
        }
    </script>
</body>

</html>
