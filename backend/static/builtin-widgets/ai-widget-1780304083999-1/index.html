<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../tailwind.min.css">
  <script defer src="../syncer.js"></script>
</head>
<body class="m-0 p-0 overflow-hidden bg-gray-900 flex items-center justify-center" style="width:100%;height:100vh">
  <div id="root" class="w-full h-full flex flex-col items-center justify-center gap-2 p-3">
    <div class="flex flex-col items-center gap-2">
      <div class="text-sm uppercase tracking-wider text-gray-400">Upcoming Meeting</div>
      <div id="title" class="text-lg font-semibold text-white"></div>
      <div class="relative w-40 h-20">
        <svg viewBox="0 0 200 100" class="absolute top-0 left-0 w-full h-full">
          <path d="M10,90 A80,80 0 0,1 190,90" stroke="#374151" stroke-width="10" fill="none" />
          <path id="value-arc" d="M10,90 A80,80 0 0,1 190,90" stroke="#6366f1" stroke-width="10" fill="none" stroke-linecap="round" />
        </svg>
        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <div id="numeric-value" class="text-4xl font-bold text-white"></div>
        </div>
      </div>
      <input type="range" id="slider" min="0" max="100" step="1" class="w-full mt-2" />
      <button id="join-button" class="px-4 py-2 mt-2 text-sm font-medium text-white bg-indigo-500 rounded hover:bg-indigo-600">Join</button>
    </div>
  </div>
  <script>
    const SIGNAL_TITLE = "Microsoft.Teams.Calendar.NextMeeting.Title";
    const SIGNAL_MINUTES = "Microsoft.Teams.Calendar.NextMeeting.MinutesUntilStart";
    const SIGNAL_JOIN_URL = "Microsoft.Teams.Calendar.NextMeeting.JoinUrl";
    let _iv = null;

    function renderTitle(title) {
      const titleElement = document.getElementById("title");
      titleElement.textContent = title || "No upcoming meeting";
    }

    function renderMinutes(minutes) {
      const arcElement = document.getElementById("value-arc");
      const valueElement = document.getElementById("numeric-value");
      const sliderElement = document.getElementById("slider");

      // Update slider value
      sliderElement.value = minutes;

      // Update arc color and sweep
      const normalizedValue = Math.max(0, Math.min(100, minutes));
      const angle = (normalizedValue / 100) * 180;
      const largeArcFlag = angle > 90 ? 1 : 0;
      const x = 10 + 80 * Math.cos((Math.PI / 180) * (180 - angle));
      const y = 90 - 80 * Math.sin((Math.PI / 180) * (180 - angle));
      arcElement.setAttribute("d", `M10,90 A80,80 0 ${largeArcFlag},1 ${x},${y}`);

      // Determine color
      let color = "#6366f1"; // Indigo for normal
      if (normalizedValue <= 5) color = "#ef4444"; // Red for danger
      else if (normalizedValue <= 10) color = "#f59e0b"; // Yellow for warning
      arcElement.setAttribute("stroke", color);

      // Update numeric value
      valueElement.textContent = normalizedValue;
    }

    function renderJoinButton(joinUrl) {
      const buttonElement = document.getElementById("join-button");
      buttonElement.style.display = joinUrl ? "block" : "none";
      buttonElement.onclick = () => {
        if (joinUrl) window.open(joinUrl, "_blank");
      };
    }

    window.onVssSync = function(data) {
      if (SIGNAL_TITLE in data) renderTitle(data[SIGNAL_TITLE]);
      if (SIGNAL_MINUTES in data) renderMinutes(data[SIGNAL_MINUTES]);
      if (SIGNAL_JOIN_URL in data) renderJoinButton(data[SIGNAL_JOIN_URL]);
    };

    window.onWidgetLoaded = function(options) {
      const title = window.getApiValue(SIGNAL_TITLE);
      const minutes = window.getApiValue(SIGNAL_MINUTES);
      const joinUrl = window.getApiValue(SIGNAL_JOIN_URL);

      renderTitle(title);
      renderMinutes(minutes !== undefined ? minutes : 0);
      renderJoinButton(joinUrl);

      const sliderElement = document.getElementById("slider");
      sliderElement.oninput = function() {
        window.setApiValue(SIGNAL_MINUTES, parseFloat(this.value));
      };
    };

    window.onWidgetUnloaded = function() {
      if (_iv) {
        clearInterval(_iv);
        _iv = null;
      }
    };
  </script>
</body>
</html>
