<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../tailwind.min.css">
  <script defer src="../syncer.js"></script>
</head>
<body class="m-0 p-0 overflow-hidden bg-gray-900 flex items-center justify-center" style="width:100%;height:100vh">
  <div id="root" class="w-full h-full flex flex-col items-center justify-center gap-2 p-3">
    <div class="text-sm uppercase tracking-widest text-gray-400">Presence Status</div>
    <div id="statusBadge" class="px-4 py-2 rounded-full text-white text-lg font-bold"></div>
    <div id="activityText" class="text-sm text-gray-500"></div>
  </div>
  <script>
    const SIGNAL = "Microsoft.Teams.Presence.Status";
    const STATUS_COLORS = {
      Available: "bg-green-500",
      Busy: "bg-red-500",
      Away: "bg-yellow-400",
      DoNotDisturb: "bg-purple-500",
      Offline: "bg-gray-700"
    };

    function render(val) {
      const badge = document.getElementById("statusBadge");
      const activity = document.getElementById("activityText");

      let status = "Offline";
      let activityText = "";

      if (val >= 0 && val < 20) {
        status = "Offline";
        activityText = "No activity detected";
      } else if (val >= 20 && val < 40) {
        status = "Away";
        activityText = "User is away";
      } else if (val >= 40 && val < 60) {
        status = "Busy";
        activityText = "User is busy";
      } else if (val >= 60 && val < 80) {
        status = "DoNotDisturb";
        activityText = "Do not disturb mode";
      } else if (val >= 80 && val <= 100) {
        status = "Available";
        activityText = "User is available";
      }

      badge.className = `px-4 py-2 rounded-full text-white text-lg font-bold ${STATUS_COLORS[status]}`;
      badge.textContent = status;
      activity.textContent = activityText;
    }

    window.onVssSync = function(data) {
      if (SIGNAL in data) render(data[SIGNAL]);
    };

    window.onWidgetLoaded = function(options) {
      const sig = (options && options.api) || SIGNAL;
      const v = window.getApiValue(sig);
      render(v !== undefined ? v : 0);
    };

    window.onWidgetUnloaded = function() {};
  </script>
</body>
</html>
