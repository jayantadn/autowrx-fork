<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../tailwind.min.css">
  <script defer src="../syncer.js"></script>
</head>
<body class="m-0 p-0 overflow-hidden bg-gray-900 flex items-center justify-center" style="width:100%;height:100vh">
  <div id="root" class="w-full h-full flex flex-col items-center justify-center gap-2 p-3">
    <div class="flex flex-col items-center gap-2">
      <div class="text-sm uppercase tracking-wide text-gray-400">Upcoming Meeting</div>
      <div id="title" class="text-lg font-semibold text-white text-center"></div>
      <div class="relative w-32 h-16">
        <svg viewBox="0 0 100 50" class="absolute top-0 left-0 w-full h-full">
          <path d="M10,50 A40,40 0 0,1 90,50" fill="none" stroke="#374151" stroke-width="8" />
          <path id="valueArc" d="M10,50 A40,40 0 0,1 90,50" fill="none" stroke="#6366f1" stroke-width="8" stroke-linecap="round" />
        </svg>
        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <div id="numericValue" class="text-4xl font-bold text-white"></div>
          <div class="text-sm text-gray-500">(none)</div>
        </div>
      </div>
      <input type="range" id="slider" min="0" max="100" step="1" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-indigo-500">
      <button id="joinButton" class="px-4 py-2 text-sm font-semibold text-white bg-indigo-500 rounded hover:bg-indigo-600 focus:outline-none focus:ring focus:ring-indigo-300">Join</button>
    </div>
  </div>
  <script>
    const SIGNAL_TITLE = "Microsoft.Teams.Calendar.NextMeeting.Title";
    const SIGNAL_MINUTES = "Microsoft.Teams.Calendar.NextMeeting.MinutesUntilStart";
    const SIGNAL_JOIN_URL = "Microsoft.Teams.Calendar.NextMeeting.JoinUrl";
    let _iv = null;

    function renderTitle(title) {
      const titleElement = document.getElementById("title");
      titleElement.textContent = title || "No upcoming meeting";
    }

    function renderMinutes(minutes) {
      const numericValueElement = document.getElementById("numericValue");
      const valueArcElement = document.getElementById("valueArc");
      const sliderElement = document.getElementById("slider");

      // Update numeric value display
      numericValueElement.textContent = minutes !== undefined ? Math.round(minutes) : "--";

      // Update slider position
      sliderElement.value = minutes !== undefined ? minutes : 0;

      // Calculate arc sweep based on value
      const min = 0, max = 100;
      const percentage = Math.min(Math.max((minutes - min) / (max - min), 0), 1);
      const angle = percentage * 180;
      const largeArcFlag = angle > 180 ? 1 : 0;
      const x = 50 + 40 * Math.cos((angle - 90) * Math.PI / 180);
      const y = 50 + 40 * Math.sin((angle - 90) * Math.PI / 180);

      // Update arc path
      valueArcElement.setAttribute("d", `M10,50 A40,40 0 ${largeArcFlag},1 ${x.toFixed(2)},${y.toFixed(2)}`);

      // Update arc color based on value
      if (minutes <= 5) {
        valueArcElement.setAttribute("stroke", "#ef4444"); // red
      } else if (minutes <= 10) {
        valueArcElement.setAttribute("stroke", "#facc15"); // yellow
      } else {
        valueArcElement.setAttribute("stroke", "#10b981"); // green
      }
    }

    function setupJoinButton(joinUrl) {
      const joinButton = document.getElementById("joinButton");
      if (joinUrl) {
        joinButton.disabled = false;
        joinButton.onclick = () => window.open(joinUrl, "_blank");
      } else {
        joinButton.disabled = true;
        joinButton.onclick = null;
      }
    }

    window.onVssSync = function(data) {
      if (SIGNAL_TITLE in data) renderTitle(data[SIGNAL_TITLE]);
      if (SIGNAL_MINUTES in data) renderMinutes(data[SIGNAL_MINUTES]);
      if (SIGNAL_JOIN_URL in data) setupJoinButton(data[SIGNAL_JOIN_URL]);
    };

    window.onWidgetLoaded = function(options) {
      const title = window.getApiValue(SIGNAL_TITLE);
      const minutes = window.getApiValue(SIGNAL_MINUTES);
      const joinUrl = window.getApiValue(SIGNAL_JOIN_URL);

      renderTitle(title);
      renderMinutes(minutes);
      setupJoinButton(joinUrl);

      const sliderElement = document.getElementById("slider");
      sliderElement.oninput = function() {
        window.setApiValue(SIGNAL_MINUTES, parseFloat(this.value));
      };
    };

    window.onWidgetUnloaded = function() {
      if (_iv) { clearInterval(_iv); _iv = null; }
    };
  </script>
</body>
</html>
