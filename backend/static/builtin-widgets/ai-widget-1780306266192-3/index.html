<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../tailwind.min.css">
  <script defer src="../syncer.js"></script>
</head>
<body class="m-0 p-0 overflow-hidden bg-gray-900 flex items-center justify-center" style="width:100%;height:100vh">
  <div id="root" class="w-full h-full flex flex-col items-center justify-center gap-2 p-3">
    <div class="flex flex-col items-center gap-2">
      <div class="text-sm uppercase tracking-widest text-gray-400">Unread Chats</div>
      <div id="badge" class="px-4 py-2 rounded-full text-lg font-bold text-white bg-gray-700">0</div>
      <div id="sender" class="text-base text-gray-400">Last sender: <span class="text-white">None</span></div>
      <div id="preview" class="text-sm text-gray-500 italic">No new messages</div>
    </div>
  </div>
  <script>
    const SIGNAL_COUNT = "Microsoft.Teams.Chat.UnreadCount";
    const SIGNAL_SENDER = "Microsoft.Teams.Chat.LastSender";
    const SIGNAL_PREVIEW = "Microsoft.Teams.Chat.LastMessagePreview";

    function render(count, sender, preview) {
      const badge = document.getElementById("badge");
      const senderElem = document.getElementById("sender");
      const previewElem = document.getElementById("preview");

      // Update unread count badge
      badge.textContent = count;
      badge.className = `px-4 py-2 rounded-full text-lg font-bold text-white ${count > 0 ? 'bg-red-500' : 'bg-gray-700'}`;

      // Update last sender
      senderElem.innerHTML = `Last sender: <span class="text-white">${sender || 'None'}</span>`;

      // Update message preview
      previewElem.textContent = preview || 'No new messages';
    }

    window.onVssSync = function(data) {
      const count = data[SIGNAL_COUNT] !== undefined ? data[SIGNAL_COUNT] : 0;
      const sender = data[SIGNAL_SENDER] || null;
      const preview = data[SIGNAL_PREVIEW] || null;
      render(count, sender, preview);
    };

    window.onWidgetLoaded = function(options) {
      const count = window.getApiValue(SIGNAL_COUNT) || 0;
      const sender = window.getApiValue(SIGNAL_SENDER) || null;
      const preview = window.getApiValue(SIGNAL_PREVIEW) || null;
      render(count, sender, preview);
    };

    window.onWidgetUnloaded = function() {
      // No timers to clear for this widget
    };
  </script>
</body>
</html>
