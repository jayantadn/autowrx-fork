<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../tailwind.min.css">
  <script defer src="../syncer.js"></script>
</head>
<body class="m-0 p-0 overflow-hidden bg-gray-900 flex items-center justify-center" style="width:100%;height:100vh">
  <div id="root" class="w-full h-full flex flex-col items-center justify-center gap-2 p-3">
    <div class="text-sm uppercase tracking-wide text-gray-400">Presence Status</div>
    <div id="statusBadge" class="px-4 py-2 rounded-full text-white text-lg font-semibold"></div>
    <div id="activityText" class="text-sm text-gray-500"></div>
  </div>
  <script>
    const SIGNAL = "Microsoft.Teams.Presence.Status";
    const STATUS_COLORS = {
      Available: "bg-green-500",
      Busy: "bg-red-500",
      Away: "bg-yellow-400",
      DoNotDisturb: "bg-purple-500",
      Offline: "bg-gray-700"
    };

    function render(val) {
      const badge = document.getElementById("statusBadge");
      const activity = document.getElementById("activityText");

      if (typeof val === "string") {
        const colorClass = STATUS_COLORS[val] || "bg-gray-700";
        badge.className = `px-4 py-2 rounded-full text-white text-lg font-semibold ${colorClass}`;
        badge.textContent = val;
        activity.textContent = `Activity: ${val}`;
      } else {
        badge.className = "px-4 py-2 rounded-full text-white text-lg font-semibold bg-gray-700";
        badge.textContent = "Unknown";
        activity.textContent = "Activity: Unknown";
      }
    }

    window.onVssSync = function(data) {
      if (SIGNAL in data) render(data[SIGNAL]);
    };

    window.onWidgetLoaded = function(options) {
      const sig = (options && options.api) || SIGNAL;
      const v = window.getApiValue(sig);
      render(v !== undefined ? v : "Offline");
    };

    window.onWidgetUnloaded = function() {
      // No timers to clear in this widget
    };
  </script>
</body>
</html>
