<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../tailwind.min.css">
  <script defer src="../syncer.js"></script>
</head>
<body class="m-0 p-0 overflow-hidden bg-gray-900 flex items-center justify-center" style="width:100%;height:100vh">
  <div id="root" class="w-full h-full flex flex-col items-center justify-center gap-4 p-3">
    <div id="widget" class="flex flex-col items-center justify-center bg-gray-800 rounded-lg p-4 shadow-lg w-full max-w-md">
      <div class="text-sm uppercase tracking-wider text-gray-400 mb-2">Upcoming Meeting</div>
      <div id="title" class="text-lg font-semibold text-white mb-4 text-center">No meeting scheduled</div>
      <div class="relative w-full h-40 flex items-center justify-center">
        <svg viewBox="0 0 200 100" class="w-full h-full">
          <path d="M10,90 A80,80 0 0,1 190,90" stroke="#374151" stroke-width="10" fill="none" />
          <path id="valueArc" d="M10,90 A80,80 0 0,1 10,90" stroke="#6366f1" stroke-width="10" fill="none" />
        </svg>
        <div class="absolute text-4xl font-bold text-white" id="minutes">--</div>
      </div>
      <input type="range" id="slider" min="0" max="100" step="1" class="w-full mt-4" hidden />
      <button id="joinButton" class="mt-4 px-4 py-2 bg-indigo-500 text-white font-semibold rounded-lg hover:bg-indigo-600 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2" hidden>Join Meeting</button>
    </div>
  </div>
  <script>
    const SIGNAL_TITLE = "Microsoft.Teams.Calendar.NextMeeting.Title";
    const SIGNAL_MINUTES = "Microsoft.Teams.Calendar.NextMeeting.MinutesUntilStart";
    const SIGNAL_JOIN_URL = "Microsoft.Teams.Calendar.NextMeeting.JoinUrl";

    let _iv = null;

    function renderTitle(title) {
      const titleElement = document.getElementById("title");
      titleElement.textContent = title || "No meeting scheduled";
    }

    function renderMinutes(minutes) {
      const arcElement = document.getElementById("valueArc");
      const minutesElement = document.getElementById("minutes");
      const sliderElement = document.getElementById("slider");
      const joinButton = document.getElementById("joinButton");

      if (minutes === undefined || minutes === null) {
        arcElement.setAttribute("d", "M10,90 A80,80 0 0,1 10,90");
        minutesElement.textContent = "--";
        sliderElement.hidden = true;
        joinButton.hidden = true;
        return;
      }

      const angle = (minutes / 100) * 180;
      const x = 10 + 80 * Math.cos((angle - 90) * Math.PI / 180);
      const y = 90 + 80 * Math.sin((angle - 90) * Math.PI / 180);
      arcElement.setAttribute("d", `M10,90 A80,80 0 ${angle > 90 ? 1 : 0},1 ${x},${y}`);

      let color = "#6366f1"; // Indigo for normal
      if (minutes <= 5) color = "#ef4444"; // Red for danger
      else if (minutes <= 10) color = "#f59e0b"; // Yellow for warning
      arcElement.setAttribute("stroke", color);

      minutesElement.textContent = minutes.toFixed(0);
      sliderElement.hidden = false;
      sliderElement.value = minutes;

      joinButton.hidden = false;
    }

    function renderJoinButton(joinUrl) {
      const joinButton = document.getElementById("joinButton");
      if (joinUrl) {
        joinButton.onclick = () => window.open(joinUrl, "_blank");
      } else {
        joinButton.hidden = true;
      }
    }

    window.onVssSync = function(data) {
      if (SIGNAL_TITLE in data) renderTitle(data[SIGNAL_TITLE]);
      if (SIGNAL_MINUTES in data) renderMinutes(data[SIGNAL_MINUTES]);
      if (SIGNAL_JOIN_URL in data) renderJoinButton(data[SIGNAL_JOIN_URL]);
    };

    window.onWidgetLoaded = function(options) {
      const title = window.getApiValue(SIGNAL_TITLE);
      const minutes = window.getApiValue(SIGNAL_MINUTES);
      const joinUrl = window.getApiValue(SIGNAL_JOIN_URL);

      renderTitle(title);
      renderMinutes(minutes);
      renderJoinButton(joinUrl);
    };

    window.onWidgetUnloaded = function() {
      if (_iv) { clearInterval(_iv); _iv = null; }
    };
  </script>
</body>
</html>
