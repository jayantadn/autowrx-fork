<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../tailwind.min.css">
  <script defer src="../syncer.js"></script>
</head>
<body class="m-0 p-0 overflow-hidden bg-gray-900 flex items-center justify-center" style="width:100%;height:100vh">
  <div id="root" class="w-full h-full flex flex-col items-center justify-center gap-2 p-3">
    <div class="flex flex-col items-center gap-2">
      <div class="text-sm uppercase tracking-widest text-gray-400">Unread Chats</div>
      <div id="badge" class="px-4 py-2 rounded-full text-white text-2xl font-bold bg-gray-700">0</div>
      <div id="sender" class="text-lg text-gray-300">No new messages</div>
      <div id="preview" class="text-sm text-gray-500">---</div>
    </div>
  </div>
  <script>
    const SIGNAL = "Microsoft.Teams.Chat.UnreadCount";
    const LAST_SENDER_SIGNAL = "Microsoft.Teams.Chat.LastSender";
    const MESSAGE_PREVIEW_SIGNAL = "Microsoft.Teams.Chat.MessagePreview";

    function renderUnreadCount(val) {
      const badge = document.getElementById("badge");
      badge.textContent = val;
      badge.className = `px-4 py-2 rounded-full text-white text-2xl font-bold ${val > 0 ? 'bg-red-500' : 'bg-gray-700'}`;
    }

    function renderSender(sender) {
      const senderElement = document.getElementById("sender");
      senderElement.textContent = sender || "No new messages";
    }

    function renderPreview(preview) {
      const previewElement = document.getElementById("preview");
      previewElement.textContent = preview || "---";
    }

    window.onVssSync = function(data) {
      if (SIGNAL in data) renderUnreadCount(data[SIGNAL]);
      if (LAST_SENDER_SIGNAL in data) renderSender(data[LAST_SENDER_SIGNAL]);
      if (MESSAGE_PREVIEW_SIGNAL in data) renderPreview(data[MESSAGE_PREVIEW_SIGNAL]);
    };

    window.onWidgetLoaded = function(options) {
      const unreadCount = window.getApiValue(SIGNAL);
      const lastSender = window.getApiValue(LAST_SENDER_SIGNAL);
      const messagePreview = window.getApiValue(MESSAGE_PREVIEW_SIGNAL);

      renderUnreadCount(unreadCount !== undefined ? unreadCount : 0);
      renderSender(lastSender);
      renderPreview(messagePreview);
    };

    window.onWidgetUnloaded = function() {
      // No timers to clear in this widget
    };
  </script>
</body>
</html>
