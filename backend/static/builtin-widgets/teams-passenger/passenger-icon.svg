<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="#1a1d24"/>
  
  <!-- Front seats (back view) -->
  <rect x="6" y="20" width="10" height="18" rx="3" fill="#333"/>
  <rect x="7" y="14" width="8" height="8" rx="2" fill="#444"/>
  
  <rect x="32" y="20" width="10" height="18" rx="3" fill="#333"/>
  <rect x="33" y="14" width="8" height="8" rx="2" fill="#444"/>
  
  <!-- Rear screen -->
  <rect x="16" y="8" width="16" height="12" rx="2" fill="#5865F2"/>
  
  <!-- Screen mount -->
  <rect x="22" y="5" width="4" height="4" rx="1" fill="#666"/>
  
  <!-- Teams icon on screen -->
