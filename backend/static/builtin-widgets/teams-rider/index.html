<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams - Rider View</title>
  <script defer src="../syncer.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0f;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .motorcycle-view {
      width: 100%;
      height: 100%;
      position: relative;
      background: linear-gradient(180deg, #1a2030 0%, #0f1218 40%, #0a0a0f 100%);
      display: flex;
      flex-direction: column;
    }

    .road-view {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 35%;
      background: linear-gradient(180deg, rgba(30,40,60,0.8) 0%, rgba(20,25,35,0.9) 60%, rgba(15,18,24,1) 100%);
      pointer-events: none;
    }

    .road-lines {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 4px; height: 60%;
      background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.3) 0px, rgba(255,255,255,0.3) 20px, transparent 20px, transparent 40px);
    }

    .handlebar-frame {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 55%;
      pointer-events: none;
      z-index: 5;
    }

    .handlebar-left, .handlebar-right {
      position: absolute;
      bottom: 10%;
      width: 18%; height: 70%;
      background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 50%, #0f0f0f 100%);
      border-radius: 20px 20px 30px 30px;
      box-shadow: inset 0 2px 10px rgba(255,255,255,0.05), 0 -5px 20px rgba(0,0,0,0.5);
    }

    .handlebar-left { left: -5%; transform: rotate(-15deg); }
    .handlebar-right { right: -5%; transform: rotate(15deg); }

    .grip {
      position: absolute;
      top: 10%; width: 100%; height: 40%;
      background: repeating-linear-gradient(90deg, rgba(0,0,0,0.3) 0px, rgba(0,0,0,0.3) 3px, transparent 3px, transparent 6px);
    }

    .mirror-left, .mirror-right {
      position: absolute;
      top: 5%; width: 12%; height: 8%;
      background: linear-gradient(135deg, #333 0%, #1a1a1a 100%);
      border-radius: 50%;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    .mirror-left { left: 8%; }
    .mirror-right { right: 8%; }
    .mirror-glass {
      position: absolute;
      top: 15%; left: 15%; right: 15%; bottom: 15%;
      background: linear-gradient(135deg, rgba(100,120,140,0.3) 0%, rgba(60,80,100,0.2) 100%);
      border-radius: 50%;
    }

    .dashboard-cluster {
      position: absolute;
      top: 38%; left: 50%;
      transform: translateX(-50%);
      width: 75%; height: 55%;
      background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
      border-radius: 20px;
      box-shadow: 0 0 0 3px #2a2a2a, 0 0 0 5px #1a1a1a, 0 10px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 10;
      pointer-events: auto;
    }

    .speedo-section {
      position: absolute;
      left: 4%; top: 50%;
      transform: translateY(-50%);
      width: 28%; aspect-ratio: 1;
    }

    .speedo-ring {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: conic-gradient(from 135deg, var(--mode-color, #22c55e) 0%, var(--mode-color, #22c55e) var(--speed-pct, 0%), rgba(255,255,255,0.08) var(--speed-pct, 0%), rgba(255,255,255,0.08) 75%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 15px rgba(0,0,0,0.4);
    }

    .speedo-ring::before {
      content: '';
      position: absolute;
      width: 75%; height: 75%;
      border-radius: 50%;
      background: linear-gradient(145deg, #1a1a1a 0%, #0a0a0a 100%);
    }

    .speedo-value {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .speed-number { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
    .speed-unit { font-size: 8px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }

    .teams-section {
      position: absolute;
      right: 4%; top: 6%; bottom: 6%;
      width: 62%;
      display: flex;
      flex-direction: column;
      padding: 6px;
      pointer-events: auto;
      overflow: visible;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
      background: rgba(0,0,0,0.4);
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 9px;
    }

    .status-left { display: flex; align-items: center; gap: 8px; }

    .tvs-badge {
      padding: 3px 8px;
      background: linear-gradient(135deg, #e31837 0%, #c41230 100%);
      border-radius: 4px;
      font-weight: 700;
      font-size: 8px;
    }

    .mode-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 10px;
      font-size: 9px;
      color: var(--mode-color, #22c55e);
    }

    .mode-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--mode-color, #22c55e);
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .demo-tag {
      padding: 2px 6px;
      background: rgba(255,180,0,0.15);
      color: #ffb400;
      border-radius: 4px;
      font-size: 8px;
      font-weight: 700;
    }

    .time-display { color: rgba(255,255,255,0.5); }

    .teams-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, rgba(88,101,242,0.1) 0%, rgba(88,101,242,0.02) 100%);
      border: 1px solid rgba(88,101,242,0.15);
      border-radius: 12px;
      padding: 8px;
      overflow: visible;
      pointer-events: auto;
      min-height: 0;
    }

    .teams-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .teams-logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #5865F2 0%, #7289DA 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(88,101,242,0.4);
    }

    .teams-logo svg { width: 18px; height: 18px; fill: #fff; }

    .teams-info { flex: 1; }
    .teams-title { font-size: 12px; font-weight: 600; }
    .teams-sub { font-size: 9px; color: rgba(255,255,255,0.4); }

    .meeting-info { flex: 1; display: flex; flex-direction: column; gap: 6px; }

    .meeting-subject {
      font-size: 11px;
      font-weight: 600;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .meeting-time { display: flex; align-items: baseline; gap: 4px; }
    .time-big { font-size: 18px; font-weight: 300; color: #818cf8; }
    .time-label { font-size: 9px; color: rgba(255,255,255,0.4); }
    .meeting-host { font-size: 9px; color: rgba(255,255,255,0.4); }

    .action-row { display: flex; gap: 6px; margin-top: 8px; pointer-events: auto; }

    .action-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      pointer-events: auto;
    }

    .action-btn svg { width: 14px; height: 14px; }

    .action-btn.primary {
      background: linear-gradient(135deg, #5865F2 0%, #6D7AE5 100%);
      color: #fff;
      box-shadow: 0 3px 12px rgba(88,101,242,0.35);
    }

    .action-btn.primary:hover { box-shadow: 0 5px 20px rgba(88,101,242,0.5); }

    .action-btn.secondary {
      background: rgba(34,197,94,0.1);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.2);
    }

    .action-btn.disabled {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.25);
      cursor: not-allowed;
      pointer-events: none;
    }

    .action-btn:not(.disabled) {
      pointer-events: auto;
      cursor: pointer;
    }

    button {
      pointer-events: auto;
      cursor: pointer;
    }

    button svg, .action-btn svg, .ctrl-btn svg, .incoming-btn svg {
      pointer-events: none;
    }

    .voice-hint {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.15);
      border-radius: 8px;
      margin-top: 6px;
    }

    .voice-icon {
      width: 28px; height: 28px;
      background: rgba(34,197,94,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .voice-icon svg { width: 14px; height: 14px; color: #22c55e; }

    .voice-text { flex: 1; }
    .voice-command { font-size: 10px; font-weight: 600; color: #22c55e; }
    .voice-desc { font-size: 8px; color: rgba(255,255,255,0.4); }

    .helmet-indicator {
      position: absolute;
      bottom: 4px; right: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
      font-size: 8px;
      z-index: 5;
    }

    .helmet-indicator svg { width: 14px; height: 14px; color: #22c55e; }

    .audio-bars { display: flex; align-items: center; gap: 2px; height: 12px; }

    .audio-bar {
      width: 2px;
      background: #22c55e;
      border-radius: 1px;
      animation: audioWave 0.5s ease-in-out infinite;
    }

    .audio-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
    .audio-bar:nth-child(2) { height: 10px; animation-delay: 0.1s; }
    .audio-bar:nth-child(3) { height: 8px; animation-delay: 0.2s; }
    .audio-bar:nth-child(4) { height: 12px; animation-delay: 0.3s; }

    @keyframes audioWave { 0%, 100% { transform: scaleY(0.5); } 50% { transform: scaleY(1); } }

    /* ========== JOINING STATE ========== */
    .joining-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .joining-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(88,101,242,0.2);
      border-top-color: #5865F2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .joining-text { font-size: 12px; color: rgba(255,255,255,0.7); }

    .cancel-btn {
      padding: 8px 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      cursor: pointer;
    }

    /* ========== IN MEETING STATE ========== */
    .meeting-active {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 0;
    }

    .meeting-header {
      text-align: center;
      padding: 6px;
      background: rgba(88,101,242,0.15);
      border-radius: 8px;
      margin-bottom: 4px;
    }

    .meeting-status { font-size: 9px; color: #818cf8; margin-bottom: 2px; }

    .meeting-timer {
      font-size: 20px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
    }

    .meeting-info-small {
      text-align: center;
      padding: 4px;
    }

    .meeting-title { font-size: 10px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .participant-count {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      font-size: 9px;
    }

    .participant-count svg { width: 10px; height: 10px; }

    .meeting-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 6px 0;
      margin-top: auto;
    }

    .ctrl-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      pointer-events: auto;
    }

    .ctrl-btn svg { width: 16px; height: 16px; pointer-events: none; }

    .ctrl-btn.mute { background: rgba(255,255,255,0.1); color: #fff; }
    .ctrl-btn.mute.active { background: #ef4444; }
    .ctrl-btn.end { background: #ef4444; color: #fff; width: 46px; border-radius: 23px; }

    /* ========== INCOMING CALL ========== */
    .incoming-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(180deg, rgba(34,197,94,0.95) 0%, rgba(22,163,74,0.98) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      border-radius: 20px;
      pointer-events: auto;
    }

    .incoming-avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 10px;
      animation: ringPulse 1.5s infinite;
    }

    @keyframes ringPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); } 50% { box-shadow: 0 0 0 12px rgba(255,255,255,0); } }

    .incoming-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .incoming-title { font-size: 11px; opacity: 0.8; margin-bottom: 16px; }

    .incoming-actions { display: flex; gap: 24px; }

    .incoming-btn {
      width: 50px; height: 50px;
      border-radius: 50%;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      pointer-events: auto;
    }

    .incoming-btn svg { width: 20px; height: 20px; }
    .incoming-btn span { font-size: 8px; margin-top: 2px; }
    .incoming-btn.answer { background: #fff; color: #22c55e; }
    .incoming-btn.decline { background: rgba(0,0,0,0.3); color: #fff; }

    /* ========== IN CALL STATE ========== */
    .call-active {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 0;
    }

    .call-header {
      text-align: center;
      padding: 6px;
      background: rgba(34,197,94,0.15);
      border-radius: 8px;
      margin-bottom: 4px;
    }

    .call-status { font-size: 9px; color: #22c55e; margin-bottom: 2px; }

    .call-timer {
      font-size: 20px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
    }

    .caller-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .caller-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5865F2 0%, #7289DA 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .caller-name { font-size: 11px; font-weight: 600; }
    .caller-title { font-size: 8px; color: rgba(255,255,255,0.4); }

    .call-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 6px 0;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.3);
    }

    .empty-icon {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .empty-icon svg { width: 20px; height: 20px; opacity: 0.4; }
    .empty-text { font-size: 11px; }

    /* ===== Ride Dashboard (idle state) ===== */
    .ride-dashboard {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px 4px;
      flex: 1;
    }
    .ride-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .ride-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .ride-card-label {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: rgba(255,255,255,0.45);
      font-weight: 600;
    }
    .ride-card-value {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: baseline;
      gap: 2px;
    }
    .ride-card-value .unit {
      font-size: 9px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
    }
    .ride-card-bar {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 2px;
    }
    .ride-card-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e 0%, #84cc16 100%);
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    .ride-card-bar-fill.warn {
      background: linear-gradient(90deg, #f59e0b 0%, #ef4444 100%);
    }
    .ride-standby {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      background: rgba(88,101,242,0.10);
      border: 1px solid rgba(88,101,242,0.25);
      border-radius: 8px;
      font-size: 9px;
      color: rgba(255,255,255,0.7);
    }
    .ride-standby .standby-icon {
      width: 14px; height: 14px;
      color: #5865F2;
      flex-shrink: 0;
    }
    .ride-standby .standby-icon svg { width: 14px; height: 14px; }
    .ride-standby .standby-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34,197,94,0.7);
      margin-left: auto;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .ride-pills {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }
    .ride-pill {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 7px 8px;
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: background 0.15s ease;
    }
    .ride-pill:hover { background: rgba(255,255,255,0.10); }
    .ride-pill.primary {
      background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%);
      border-color: transparent;
    }
    .ride-pill.primary:hover { filter: brightness(1.1); }
    .ride-pill.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .ride-pill svg { width: 12px; height: 12px; }

    /* ===== 3-button incoming actions + safety states ===== */
    .incoming-btn.switch-device {
      background: rgba(88,101,242,0.95);
      color: #fff;
    }
    .incoming-actions.three-btn {
      gap: 14px;
    }
    .incoming-btn.locked {
      opacity: 0.35;
      cursor: not-allowed;
      filter: grayscale(0.5);
      position: relative;
    }
    .incoming-btn.locked::after {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 2px solid rgba(239,68,68,0.7);
      transform: rotate(-45deg);
      pointer-events: none;
    }
    .incoming-btn.locked::before {
      content: '';
      position: absolute;
      width: 60%;
      height: 2px;
      background: rgba(239,68,68,0.85);
      transform: rotate(45deg);
      pointer-events: none;
    }
    .incoming-btn.recommended {
      animation: rec-pulse 1.4s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(88,101,242,0.7);
    }
    @keyframes rec-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(88,101,242,0.6); }
      50%      { box-shadow: 0 0 0 8px rgba(88,101,242,0); }
    }
    .incoming-safety-banner {
      width: 90%;
      margin: 0 auto 8px auto;
      padding: 5px 8px;
      font-size: 9px;
      font-weight: 600;
      text-align: center;
      border-radius: 6px;
      letter-spacing: 0.3px;
    }
    .incoming-safety-banner.ok    { background: rgba(34,197,94,0.18);  color: #4ade80; border: 1px solid rgba(34,197,94,0.4); }

    /* "Recommended" tag in device picker */

    /* Ride-mode safety hint on idle dashboard */

    /* In-call speed warning + handoff suggestion */
    .call-speed-warning {

      align-items: center;

    /* ===== Device picker overlay ===== */
    .device-picker-overlay {
      position: absolute;

    .device-confirm-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(34,197,94,0.10) 0%, rgba(10,10,15,0.96) 100%);

      color: #22c55e;
      display: flex;

      font-size: 13px;
      font-weight: 700;

    }

      font-size: 10px;
      color: rgba(255,255,255,0.6);
      text-align: center;

      width: 100%; height: 100%;
      display: flex;

    .spinner {
      width: 30px; height: 30px;
      border: 3px solid rgba(88,101,242,0.2);
      border-top-color: #5865F2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>
  <div class="motorcycle-view" id="app">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <script>
    const API = window.location.origin;

    // State: 'idle' | 'joining' | 'in_meeting' | 'incoming' | 'in_call' | 'picking_device' | 'device_chosen'
    let state = 'idle';
    let speed = 0;
    let now = new Date();
    let meeting = null;
    let incomingCall = null;
    let activeCall = null;
    let callStartTime = null;
    let callDuration = '00:00';
    let callTimer = null;
    let isMuted = false;
    let participants = 3;

    // Ride dashboard data (idle state)
    let battery = 78;
    let rangeKm = 142;
    let tripKm = 23.4;

    // Device handoff
    let chosenDevice = null;
    let deviceConfirmTimer = null;

    // Auto-call demo
    let autoCallTimer = null;
    let autoCallFired = false;
    let lastIncomingSignalValue = false;

    const mockCallers = [
      { id: '1', name: 'Rajesh Kumar', title: 'Engineering Manager' },
      { id: '2', name: 'Priya Sharma', title: 'Product Lead' },
      { id: '3', name: 'Amit Patel', title: 'Team Lead' },
    ];

    const mockMeeting = {
      id: 'm1',
      subject: 'Sprint Planning - Connected Vehicles',
      start: new Date(Date.now() + 15 * 60000).toISOString(),
      organizer: { name: 'Priya Sharma', title: 'Product Lead' },
      onlineMeeting: { joinUrl: 'https://teams.microsoft.com/l/meetup-join/mock' },
      _isMock: true
    };

    const svg = {
      teams: `<svg viewBox="0 0 24 24"><path d="M19.5 9.5c1.38 0 2.5 1.12 2.5 2.5v5c0 1.38-1.12 2.5-2.5 2.5H18v-7.5c0-1.38-1.12-2.5-2.5-2.5h-2.5V7c0-1.38 1.12-2.5 2.5-2.5h1c1.38 0 2.5 1.12 2.5 2.5v.5c.28 0 .5.22.5.5v1.5z"/><circle cx="16" cy="3.5" r="2"/><rect x="3" y="9" width="12" height="10" rx="2"/><circle cx="9" cy="6" r="3"/></svg>`,
      mic: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>`,
      micOff: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/></svg>`,
      phone: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`,
      phoneOff: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>`,
      calendar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>`,
      helmet: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12v5c0 1.66 1.34 3 3 3h2v-7H4.5C4.5 8.5 8 5 12 5s7.5 3.5 7.5 8H17v7h2c1.66 0 3-1.34 3-3v-5c0-5.52-4.48-10-10-10z"/></svg>`,
      users: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
      battery: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="18" height="10" rx="2"/><line x1="22" y1="11" x2="22" y2="13"/></svg>`,
      route: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="19" r="3"/><circle cx="18" cy="5" r="3"/><path d="M6 16V8a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4"/></svg>`,
      music: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
      laptop: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="12" rx="2"/><line x1="2" y1="20" x2="22" y2="20"/></svg>`,
      mobile: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>`,
      tablet: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>`,
      watch: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="6"/><path d="M16.51 17.35l-.35 3.83a2 2 0 0 1-2 1.82H9.83a2 2 0 0 1-2-1.82l-.35-3.83m.01-10.7l.35-3.83A2 2 0 0 1 9.83 1h4.35a2 2 0 0 1 2 1.82l.35 3.83"/></svg>`,
      devices: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="14" height="10" rx="1.5"/><rect x="14" y="9" width="8" height="11" rx="1.5"/></svg>`,
      check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
    };

    const DEVICES = {
      laptop:     { id: 'laptop',     label: 'Laptop',     icon: 'laptop' },
      phone:      { id: 'phone',      label: 'Phone',      icon: 'mobile' },
      tablet:     { id: 'tablet',     label: 'Tablet',     icon: 'tablet' },
      smartwatch: { id: 'smartwatch', label: 'Smartwatch', icon: 'watch' },
    };

    function getRideMode(spd) {
      if (spd <= 0) return { name: 'STOPPED', color: '#22c55e' };
      if (spd <= 30) return { name: 'CITY', color: '#3b82f6' };
      if (spd <= 60) return { name: 'URBAN', color: '#f59e0b' };
      return { name: 'HIGHWAY', color: '#ef4444' };
    }

    /**
     * Single source of truth for safety gating. Every UI control reads from here.
     * - severity: 'ok' | 'warn' | 'block' (drives banner / hint colour)
     * - canAnswer: lock/unlock the green Answer button on incoming calls
     * - canJoin: lock/unlock the calendar Join Meeting button
     * - canVideo: video features (kept for future; rider widget is audio-only today)
     * - canManualMute: allow rider to toggle mute (highway forces mute)
     * - autoMuteOnAnswer: mute mic the moment the call connects
     * - recommendHandoff: pulse the "Other" device button + flag laptop in picker
     * - forceHandoff: HIGHWAY-grade rule — answering is denied; only handoff/decline allowed
     * - hint: short text shown on incoming overlay + idle dashboard
     */
    function getSafetyRules(spd) {
      const mode = getRideMode(spd);
      if (spd <= 0) {
        return {
          mode, severity: 'ok',
          canAnswer: true, canJoin: true, canVideo: true, canManualMute: true,
          autoMuteOnAnswer: false, recommendHandoff: false, forceHandoff: false,
          hint: 'Stopped · all controls available',
        };
      }
      if (spd <= 30) {
        return {
          mode, severity: 'ok',
          canAnswer: true, canJoin: false, canVideo: false, canManualMute: true,
          autoMuteOnAnswer: false, recommendHandoff: false, forceHandoff: false,
          hint: 'City · voice calls OK · stop to join meetings',
        };
      }
      if (spd <= 60) {
        return {
          mode, severity: 'warn',
          canAnswer: true, canJoin: false, canVideo: false, canManualMute: true,
          autoMuteOnAnswer: true, recommendHandoff: true, forceHandoff: false,
          hint: 'Urban · voice only · auto-mute on answer · handoff suggested',
        };
      }
      return {
        mode, severity: 'block',
        canAnswer: false, canJoin: false, canVideo: false, canManualMute: false,
        autoMuteOnAnswer: true, recommendHandoff: true, forceHandoff: true,
        hint: 'Highway · answering blocked · transfer to another device',
      };
    }

    function canJoinMeeting(spd) { return getSafetyRules(spd).canJoin; }
    function canAnswerCall(spd) { return getSafetyRules(spd).canAnswer; }

    function formatTime(d) {
      const h = d.getHours(), m = String(d.getMinutes()).padStart(2, '0');
      return `${h % 12 || 12}:${m} ${h >= 12 ? 'PM' : 'AM'}`;
    }

    function formatTimeUntil(iso) {
      const diff = Math.max(0, new Date(iso) - now);
      const mins = Math.floor(diff / 60000);
      return mins < 60 ? `${mins}` : `${Math.floor(mins / 60)}h ${mins % 60}`;
    }

    function formatDuration(ms) {
      const s = Math.floor(ms / 1000);
      return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
    }

    function getInitials(name) {
      return name.split(' ').map(n => n[0]).join('').toUpperCase();
    }

    // ========== ACTIONS ==========

    function joinMeeting() {
      console.log('[Teams Rider] joinMeeting called, speed:', speed, 'canJoin:', canJoinMeeting(speed));
      if (!canJoinMeeting(speed)) {
        console.log('[Teams Rider] Cannot join - speed too high');
        return;
      }
      
      state = 'joining';
      console.log('[Teams Rider] State changed to joining');
      draw();

      // Simulate connection (2 seconds)
      setTimeout(() => {
        // Open Teams URL
        const url = meeting?.onlineMeeting?.joinUrl;
        if (url) window.open(url, '_blank');

        // Show in-meeting UI
        state = 'in_meeting';
        callStartTime = Date.now();
        participants = Math.floor(Math.random() * 5) + 2;

        callTimer = setInterval(() => {
          callDuration = formatDuration(Date.now() - callStartTime);
          draw();
        }, 1000);

        draw();
      }, 2000);
    };

    function cancelJoin() {
      state = 'idle';
      draw();
    }

    function leaveMeeting() {
      if (callTimer) clearInterval(callTimer);
      callTimer = null;
      callStartTime = null;
      callDuration = '00:00';
      state = 'idle';
      isMuted = false;
      draw();
    }

    function simulateIncomingCall() {
      console.log('[Teams Rider] simulateIncomingCall called, current state:', state);
      // Only allow ringing when not already busy with a call/meeting/picker
      if (state !== 'idle' && state !== 'device_chosen') {
        console.log('[Teams Rider] Ignoring incoming call - busy in state:', state);
        return;
      }
      const caller = mockCallers[Math.floor(Math.random() * mockCallers.length)];
      incomingCall = { ...caller };
      state = 'incoming';
      // Cancel any pending auto-call once a call is in progress
      if (autoCallTimer) { clearTimeout(autoCallTimer); autoCallTimer = null; }
      console.log('[Teams Rider] State changed to incoming, caller:', caller.name);
      draw();
    }

    function openDevicePicker() {
      console.log('[Teams Rider] openDevicePicker called');
      state = 'picking_device';
      draw();
    }

    function cancelDevicePicker() {
      console.log('[Teams Rider] cancelDevicePicker called');
      // If we still have an incoming call, return to ringing; otherwise idle.
      state = incomingCall ? 'incoming' : 'idle';
      draw();
    }

    function pickDevice(deviceId) {
      const device = DEVICES[deviceId];
      if (!device) {
        console.warn('[Teams Rider] Unknown device:', deviceId);
        return;
      }
      console.log('[Teams Rider] pickDevice:', device.label);
      chosenDevice = device;
      // Clear the incoming call (it's been transferred to another device)
      incomingCall = null;
      state = 'device_chosen';

      // Emit signal so other widgets can mirror the handoff (best-effort).
      try {
        if (typeof setApiValue === 'function' && CALL_TARGET_DEVICE_SIGNAL) {
          setApiValue(CALL_TARGET_DEVICE_SIGNAL, device.id);
        }
      } catch (e) { console.warn('[Teams Rider] setApiValue failed:', e); }

      draw();

      if (deviceConfirmTimer) clearTimeout(deviceConfirmTimer);
      deviceConfirmTimer = setTimeout(() => {
        chosenDevice = null;
        state = 'idle';
        draw();
      }, 2200);
    }

    function scheduleAutoCall() {
      if (autoCallFired) return;
      if (autoCallTimer) clearTimeout(autoCallTimer);
      if (!AUTO_CALL_AFTER_MS || AUTO_CALL_AFTER_MS <= 0) return;
      console.log('[Teams Rider] scheduleAutoCall in', AUTO_CALL_AFTER_MS, 'ms');
      autoCallTimer = setTimeout(() => {
        if (state === 'idle' && !autoCallFired) {
          autoCallFired = true;
          simulateIncomingCall();
        }
      }, AUTO_CALL_AFTER_MS);
    }

    function answerCall() {
      const rules = getSafetyRules(speed);
      console.log('[Teams Rider] answerCall called, speed:', speed, 'rules:', rules);
      if (!rules.canAnswer) {
        console.log('[Teams Rider] Cannot answer - safety rule blocks (mode:', rules.mode.name, ')');
        return;
      }
      activeCall = { ...incomingCall };
      incomingCall = null;
      state = 'in_call';
      // Apply auto-mute when speed dictates (URBAN+).
      if (rules.autoMuteOnAnswer) {
        isMuted = true;
        console.log('[Teams Rider] Auto-muted on answer due to', rules.mode.name);
      }
      console.log('[Teams Rider] State changed to in_call');
      callStartTime = Date.now();
      callTimer = setInterval(() => {
        callDuration = formatDuration(Date.now() - callStartTime);
        draw();
      }, 1000);
      draw();
    }

    function declineCall() {
      console.log('[Teams Rider] declineCall called');
      incomingCall = null;
      state = 'idle';
      draw();
    }

    function toggleMute() {
      const rules = getSafetyRules(speed);
      // On HIGHWAY, mute is force-locked ON (rider cannot un-mute).
      if (!rules.canManualMute) {
        console.log('[Teams Rider] Mute toggle blocked by safety rules (', rules.mode.name, ')');
        if (!isMuted) { isMuted = true; draw(); }
        return;
      }
      isMuted = !isMuted;
      draw();
    }

    /**
     * Mid-call handoff trigger. Reuses the device picker UI. We stash the active
     * call as the "incoming" payload so the picker has caller context, and the
     * existing pickDevice() flow will end the call + show confirmation.
     */
    function handoffActiveCall() {
      if (!activeCall) return;
      console.log('[Teams Rider] handoffActiveCall - opening device picker mid-call');
      // Stop the call timer; the call is being moved off the bike.
      if (callTimer) { clearInterval(callTimer); callTimer = null; }
      incomingCall = { ...activeCall };
      activeCall = null;
      callDuration = '00:00';
      state = 'picking_device';
      draw();
    }

    function endCall() {
      if (callTimer) clearInterval(callTimer);
      callTimer = null;
      activeCall = null;
      state = 'idle';
      callDuration = '00:00';
      isMuted = false;
      draw();
    }

    async function loadMeeting() {
      try {
        const r = await fetch(`${API}/v2/teams/meetings/next`, { credentials: 'include' });
        return r.ok ? (await r.json()).meeting : null;
      } catch { return null; }
    }

    function draw() {
      const el = document.getElementById('app');
      const rules = getSafetyRules(speed);
      const mode = rules.mode;
      const speedPct = Math.min(75, (speed / 120) * 75);
      const canJoin = rules.canJoin;
      const canAnswer = rules.canAnswer;
      const mt = meeting?.start ? formatTimeUntil(meeting.start) : '--';

      let teamsContent = '';

      if (state === 'joining') {
        teamsContent = `
          <div class="teams-header">
            <div class="teams-logo">${svg.teams}</div>
            <div class="teams-info">
              <div class="teams-title">${meeting?.subject || 'Meeting'}</div>
              <div class="teams-sub">Connecting...</div>
            </div>
          </div>
          <div class="joining-container">
            <div class="joining-spinner"></div>
            <div class="joining-text">Joining meeting...</div>
            <button class="cancel-btn" data-action="cancel-join">Cancel</button>
          </div>
        `;
      } else if (state === 'in_meeting') {
        teamsContent = `
          <div class="meeting-active">
            <div class="meeting-header">
              <div class="meeting-status">● In Meeting</div>
              <div class="meeting-timer">${callDuration}</div>
            </div>
            <div class="meeting-info-small">
              <div class="meeting-title">${meeting?.subject || 'Team Meeting'}</div>
              <div class="participant-count">${svg.users} ${participants} participants</div>
            </div>
            <div class="meeting-controls">
              <button class="ctrl-btn mute ${isMuted ? 'active' : ''}" data-action="toggle-mute">${isMuted ? svg.micOff : svg.mic}</button>
              <button class="ctrl-btn end" data-action="leave-meeting">${svg.phoneOff}</button>
            </div>
          </div>
        `;
      } else if (state === 'in_call' && activeCall) {
        // If speed climbs into HIGHWAY mid-call, surface a transfer suggestion.
        const showSpeedWarning = rules.forceHandoff;
        teamsContent = `
          <div class="call-active">
            <div class="call-header">
              <div class="call-status">● Audio Call ${isMuted && !rules.canManualMute ? '· MIC LOCKED' : ''}</div>
              <div class="call-timer">${callDuration}</div>
            </div>
            <div class="caller-info">
              <div class="caller-avatar">${getInitials(activeCall.name)}</div>
              <div class="caller-name">${activeCall.name}</div>
              <div class="caller-title">${activeCall.title || ''}</div>
            </div>
            <div class="call-controls">
              <button class="ctrl-btn mute ${isMuted ? 'active' : ''} ${!rules.canManualMute ? 'locked' : ''}" data-action="toggle-mute" title="${!rules.canManualMute ? 'Mute locked at highway speed' : (isMuted ? 'Unmute' : 'Mute')}">${isMuted ? svg.micOff : svg.mic}</button>
              <button class="ctrl-btn end" data-action="end-call">${svg.phoneOff}</button>
            </div>
            ${showSpeedWarning ? `
              <div class="call-speed-warning">
                <span>Speed too high &mdash; transfer recommended</span>
                <button data-action="handoff-active-call">Transfer</button>
              </div>
            ` : ''}
          </div>
        `;
      } else {
        // ===== Idle state: ride dashboard =====
        // Default UI shown before any call. When a call comes in, the
        // .incoming-overlay (rendered below) appears on top of this view.
        const batteryWarn = battery <= 20;
        const hasMeeting = !!meeting;
        teamsContent = `
          <div class="ride-dashboard">
            <div class="ride-cards">
              <div class="ride-card">
                <div class="ride-card-label">Battery</div>
                <div class="ride-card-value">${Math.round(battery)}<span class="unit">%</span></div>
                <div class="ride-card-bar">
                  <div class="ride-card-bar-fill ${batteryWarn ? 'warn' : ''}" style="width:${Math.max(0, Math.min(100, battery))}%"></div>
                </div>
              </div>
              <div class="ride-card">
                <div class="ride-card-label">Range</div>
                <div class="ride-card-value">${Math.round(rangeKm)}<span class="unit">km</span></div>
              </div>
              <div class="ride-card">
                <div class="ride-card-label">Trip</div>
                <div class="ride-card-value">${tripKm.toFixed(1)}<span class="unit">km</span></div>
              </div>
            </div>
            <div class="ride-standby">
              <div class="standby-icon">${svg.teams}</div>
              <span>Microsoft Teams &middot; standby</span>
              <div class="standby-dot"></div>
            </div>
            <div class="ride-safety-hint ${rules.severity}" style="color: ${mode.color};">
              <span class="ride-mode-pip"></span>
              <span style="color: rgba(255,255,255,0.85);">${rules.hint}</span>
            </div>
            <div class="ride-pills">
              <button class="ride-pill" data-action="simulate-call">${svg.phone} Simulate call</button>
              ${hasMeeting ? `<button class="ride-pill ${canJoin ? 'primary' : 'disabled'}" data-action="join-meeting" ${canJoin ? '' : 'title="Stop the bike to join"'}>${svg.calendar} ${canJoin ? 'Join' : `Stop · ${mt}m`}</button>` : ''}
            </div>
          </div>
        `;
      }

      el.innerHTML = `
        <div class="road-view"><div class="road-lines"></div></div>
        <div class="handlebar-frame">
          <div class="handlebar-left"><div class="grip"></div></div>
          <div class="handlebar-right"><div class="grip"></div></div>
          <div class="mirror-left"><div class="mirror-glass"></div></div>
          <div class="mirror-right"><div class="mirror-glass"></div></div>
        </div>

        <div class="dashboard-cluster" style="--mode-color: ${mode.color}; --speed-pct: ${speedPct}%;">
          <div class="speedo-section">
            <div class="speedo-ring">
              <div class="speedo-value">
                <div class="speed-number">${Math.round(speed)}</div>
                <div class="speed-unit">km/h</div>
              </div>
            </div>
          </div>

          <div class="teams-section">
            <div class="status-bar">
              <div class="status-left">
                <span class="tvs-badge">TVS</span>
                <span class="mode-badge"><span class="mode-dot"></span>${mode.name}</span>
                ${meeting?._isMock ? '<span class="demo-tag">DEMO</span>' : ''}
              </div>
              <span class="time-display">${formatTime(now)}</span>
            </div>
            <div class="teams-card">${teamsContent}</div>
            <div class="helmet-indicator">
              ${svg.helmet}<span>Helmet</span>
              <div class="audio-bars"><div class="audio-bar"></div><div class="audio-bar"></div><div class="audio-bar"></div><div class="audio-bar"></div></div>
            </div>

            ${state === 'incoming' && incomingCall ? `
              <div class="incoming-overlay">
                <div class="incoming-avatar">${getInitials(incomingCall.name)}</div>
                <div class="incoming-name">${incomingCall.name}</div>
                <div class="incoming-title">${incomingCall.title || 'Teams Call'}</div>
                <div class="incoming-safety-banner ${rules.severity}">
                  ${rules.mode.name} &middot; ${rules.hint}
                </div>
                <div class="incoming-actions three-btn">
                  <button class="incoming-btn decline" data-action="decline-call">${svg.phoneOff}<span>Decline</span></button>
                  <button class="incoming-btn switch-device ${rules.recommendHandoff ? 'recommended' : ''}" data-action="open-device-picker">${svg.devices}<span>Other</span></button>
                  <button class="incoming-btn answer ${!rules.canAnswer ? 'locked' : ''}" data-action="answer-call" ${!rules.canAnswer ? `title="Answering blocked at ${Math.round(speed)} km/h"` : ''}>${svg.phone}<span>Answer</span></button>
                </div>
              </div>
            ` : ''}

            ${state === 'picking_device' ? `
              <div class="device-picker-overlay">
                <div class="device-picker-title">${rules.forceHandoff ? 'Transfer call to safe device' : 'Switch to other device'}</div>
                <div class="device-picker-sub">Take this call on:</div>
                <div class="device-picker-grid">
                  ${Object.values(DEVICES).map(d => {
                    // Highlight Laptop on URBAN+ as the safe-handoff target.
                    const isRecommended = rules.recommendHandoff && d.id === 'laptop';
                    return `
                      <button class="device-btn ${isRecommended ? 'recommended' : ''}" data-action="pick-device" data-device-id="${d.id}">
                        ${isRecommended ? '<span class="rec-tag">SAFE</span>' : ''}
                        ${svg[d.icon]}
                        <span>${d.label}</span>
                      </button>
                    `;
                  }).join('')}
                </div>
                <button class="device-picker-cancel" data-action="cancel-device-picker">Cancel</button>
              </div>
            ` : ''}

            ${state === 'device_chosen' && chosenDevice ? `
              <div class="device-confirm-overlay">
                <div class="device-confirm-icon">${svg.check}</div>
                <div class="device-confirm-name">${chosenDevice.label}</div>
                <div class="device-confirm-sub">Call transferred to your ${chosenDevice.label.toLowerCase()}</div>
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    // Configurable signals (overridable via widget options).
    let SPEED_SIGNAL = 'Vehicle.Speed';
    let LIGHTS_SIGNAL = 'Vehicle.Body.Lights.Beam.Low.IsOn';
    let INCOMING_CALL_SIGNAL = 'Vehicle.Cabin.Infotainment.HMI.IsCallIncoming';
    let CALL_TARGET_DEVICE_SIGNAL = 'Vehicle.Cabin.Infotainment.HMI.CallTargetDevice';
    let BATTERY_SIGNAL = '';
    let AUTO_CALL_AFTER_MS = 15000; // 0 disables; positive number = ms until auto-incoming-call

    window.onWidgetLoaded = async (options) => {
      if (options) {
        if (options.speedSignal) SPEED_SIGNAL = options.speedSignal;
        if (options.lightsSignal) LIGHTS_SIGNAL = options.lightsSignal;
        if (options.incomingCallSignal) INCOMING_CALL_SIGNAL = options.incomingCallSignal;
        if (options.callTargetDeviceSignal) CALL_TARGET_DEVICE_SIGNAL = options.callTargetDeviceSignal;
        if (options.batterySignal) BATTERY_SIGNAL = options.batterySignal;
        if (typeof options.autoCallAfterMs === 'number') AUTO_CALL_AFTER_MS = options.autoCallAfterMs;
      }
      try {
        const v = (typeof getApiValue === 'function') ? getApiValue(SPEED_SIGNAL) : undefined;
        if (v !== undefined && v !== null) speed = parseFloat(v) || 0;
        if (BATTERY_SIGNAL) {
          const b = (typeof getApiValue === 'function') ? getApiValue(BATTERY_SIGNAL) : undefined;
          if (b !== undefined && b !== null) battery = parseFloat(b) || battery;
        }
      } catch (e) {}
      meeting = await loadMeeting() || mockMeeting;
      draw();
      scheduleAutoCall();
    };

    window.onVssSync = (data) => {
      let needsRedraw = false;
      let speedChanged = false;
      if (data[SPEED_SIGNAL] !== undefined) {
        speed = parseFloat(data[SPEED_SIGNAL]) || 0;
        needsRedraw = true;
        speedChanged = true;
      }
      if (data[LIGHTS_SIGNAL] !== undefined) {
        const on = data[LIGHTS_SIGNAL];
        speed = (on === true || on === 'true' || on === 1) ? 60 : 0;
        needsRedraw = true;
        speedChanged = true;
      }
      // Mid-call safety enforcement: if speed climbs into URBAN+, force mute on.
      if (speedChanged && state === 'in_call') {
        const rules = getSafetyRules(speed);
        if (rules.autoMuteOnAnswer && !isMuted) {
          isMuted = true;
          console.log('[Teams Rider] Mid-call auto-mute applied (', rules.mode.name, ')');
        }
      }
      if (BATTERY_SIGNAL && data[BATTERY_SIGNAL] !== undefined) {
        const b = parseFloat(data[BATTERY_SIGNAL]);
        if (!isNaN(b)) { battery = b; needsRedraw = true; }
      }
      // Edge-triggered: when IncomingCall flips false -> true, ring the rider.
      if (INCOMING_CALL_SIGNAL && data[INCOMING_CALL_SIGNAL] !== undefined) {
        const raw = data[INCOMING_CALL_SIGNAL];
        const truthy = (raw === true || raw === 'true' || raw === 1 || raw === '1');
        if (truthy && !lastIncomingSignalValue) {
          console.log('[Teams Rider] IncomingCall signal rising edge - triggering call');
          simulateIncomingCall();
        }
        lastIncomingSignalValue = truthy;
      }
      if (needsRedraw) draw();
    };

    setInterval(() => { now = new Date(); if (state === 'idle') draw(); }, 60000);

    setTimeout(async () => {
      console.log('[Teams Rider] Widget initializing...');
      meeting = await loadMeeting() || mockMeeting;
      console.log('[Teams Rider] Meeting loaded:', meeting?.subject);
      draw();
      console.log('[Teams Rider] Initial draw complete, state:', state);
    }, 300);

    // Event delegation for button clicks (more reliable than onclick)
    document.addEventListener('click', function(e) {
      const btn = e.target.closest('[data-action]');
      if (!btn) {
        console.log('[Teams Rider] Click on non-action element:', e.target.tagName);
        return;
      }
      
      const action = btn.getAttribute('data-action');
      console.log('[Teams Rider] Action triggered:', action);
      
      switch (action) {
        case 'join-meeting':
          joinMeeting();
          break;
        case 'simulate-call':
          simulateIncomingCall();
          break;
        case 'answer-call':
          answerCall();
          break;
        case 'decline-call':
          declineCall();
          break;
        case 'toggle-mute':
          toggleMute();
          break;
        case 'end-call':
          endCall();
          break;
        case 'leave-meeting':
          leaveMeeting();
          break;
        case 'cancel-join':
          cancelJoin();
          break;
        case 'open-device-picker':
          openDevicePicker();
          break;
        case 'pick-device':
          pickDevice(btn.getAttribute('data-device-id'));
          break;
        case 'cancel-device-picker':
          cancelDevicePicker();
          break;
        case 'handoff-active-call':
          handoffActiveCall();
          break;
      }
    });
  </script>
</body>
</html>
