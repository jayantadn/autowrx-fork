<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microsoft Teams - Dashboard Widget</title>
  <script defer src="../syncer.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .widget-card {
      height: 100%;
      background: linear-gradient(145deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 16px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .widget-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .teams-logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #5059C9 0%, #7B83EB 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .teams-logo svg {
      width: 20px;
      height: 20px;
    }

    .header-text {
      flex: 1;
    }

    .header-title {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .header-subtitle {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .status-pill {
      font-size: 9px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 12px;
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .status-pill.demo {
      background: rgba(251, 191, 36, 0.2);
      color: #fcd34d;
    }

    /* User mode toggle */
    .user-mode-toggle {
      display: flex;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 12px;
    }

    .mode-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 12px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .mode-btn.active {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .mode-btn svg {
      width: 16px;
      height: 16px;
    }

    .meeting-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .meeting-subject {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .meeting-details {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: auto;
    }

    .detail-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }

    .detail-row svg {
      width: 14px;
      height: 14px;
      opacity: 0.6;
    }

    .time-highlight {
      font-size: 28px;
      font-weight: 300;
      color: #fff;
      letter-spacing: -1px;
    }

    .time-period {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      margin-left: 4px;
    }

    .vehicle-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(16, 185, 129, 0.1);
      border-radius: 12px;
      margin: 12px 0;
    }

    .vehicle-indicator.moving {
      background: rgba(251, 146, 60, 0.15);
    }

    .indicator-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 8px #34d399;
      animation: pulse 2s ease-in-out infinite;
    }

    .vehicle-indicator.moving .indicator-dot {
      background: #fb923c;
      box-shadow: 0 0 8px #fb923c;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .indicator-text {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    .indicator-speed {
      margin-left: auto;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }

    /* Join buttons container */
    .join-buttons {
      display: flex;
      gap: 8px;
    }

    .join-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #5059C9 0%, #7B83EB 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(80, 89, 201, 0.4);
    }

    .join-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(80, 89, 201, 0.5);
    }

    .join-btn:active {
      transform: translateY(0);
    }

    .join-btn.audio-only {
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
    }

    .join-btn.audio-only:hover {
      box-shadow: 0 6px 25px rgba(16, 185, 129, 0.5);
    }

    .join-btn.disabled {
      background: rgba(255,255,255,0.1);
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .join-btn.disabled:hover {
      transform: none;
    }

    .join-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Media mode indicator */
    .media-mode {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .media-icon {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    .media-icon.active {
      color: #34d399;
    }

    .media-icon.active svg {
      stroke: #34d399;
    }

    .media-icon svg {
      width: 16px;
      height: 16px;
    }

    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #7B83EB;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      gap: 8px;
    }

    .empty-icon {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .empty-icon svg {
      width: 24px;
      height: 24px;
      opacity: 0.4;
    }

    .empty-title {
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
    }

    .empty-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }

    .countdown {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    .countdown-value {
      color: #7B83EB;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="widget-card" id="widget">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <span class="loading-text">Loading Teams...</span>
    </div>
  </div>

  <script>
    const BACKEND_URL = window.location.origin;
    let currentMeeting = null;
    let vehicleSpeed = 0;
    let userMode = 'driver'; // 'driver' or 'passenger'

    const teamsLogoSvg = `<svg viewBox="0 0 24 24" fill="white">
      <path d="M19.5 9.5c1.38 0 2.5 1.12 2.5 2.5v5c0 1.38-1.12 2.5-2.5 2.5H18v-7.5c0-1.38-1.12-2.5-2.5-2.5h-2.5V7c0-1.38 1.12-2.5 2.5-2.5h1c1.38 0 2.5 1.12 2.5 2.5v.5c.28 0 .5.22.5.5v1.5z"/>
      <circle cx="16" cy="3.5" r="2"/>
      <rect x="3" y="9" width="12" height="10" rx="2" fill="white"/>
      <circle cx="9" cy="6" r="3"/>
    </svg>`;

    const videoIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="23 7 16 12 23 17 23 7"/>
      <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
    </svg>`;

    const audioIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>`;

    const driverIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <circle cx="12" cy="12" r="4"/>
      <line x1="12" y1="2" x2="12" y2="4"/>
      <line x1="12" y1="20" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="4" y2="12"/>
      <line x1="20" y1="12" x2="22" y2="12"/>
    </svg>`;

    const passengerIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>`;

    const clockIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    </svg>`;

    const userIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>`;

    const calendarIconSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>`;

    async function fetchMeeting() {
      try {
        const response = await fetch(`${BACKEND_URL}/v2/teams/meetings/next`, {
          credentials: 'include',
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        return data.meeting;
      } catch (error) {
        console.error('Failed to fetch meeting:', error);
        return null;
      }
    }

    function formatTime(isoString) {
      if (!isoString) return { time: '--:--', period: '' };
      const date = new Date(isoString);
      const hours = date.getHours();
      const minutes = date.getMinutes().toString().padStart(2, '0');
      const period = hours >= 12 ? 'PM' : 'AM';
      const displayHours = hours % 12 || 12;
      return { time: `${displayHours}:${minutes}`, period };
    }

    function getTimeUntil(isoString) {
      if (!isoString) return null;
      const now = new Date();
      const meetingTime = new Date(isoString);
      const diffMs = meetingTime - now;
      if (diffMs < 0) return 'Now';
      const diffMins = Math.floor(diffMs / 60000);
      if (diffMins < 60) return `${diffMins} min`;
      const hours = Math.floor(diffMins / 60);
      const mins = diffMins % 60;
      return `${hours}h ${mins}m`;
    }

    function getMediaCapabilities() {
      const isMoving = vehicleSpeed > 5;
      
      if (userMode === 'passenger') {
        // Passenger: Full video + audio always
        return { video: true, audio: true, message: 'Full meeting access' };
      } else {
        // Driver
        if (isMoving) {
          // Driver moving: Audio only
          return { video: false, audio: true, message: 'Audio only while driving' };
        } else {
          // Driver parked: Full video + audio
          return { video: true, audio: true, message: 'Full meeting access' };
        }
      }
    }

    function setUserMode(mode) {
      userMode = mode;
      renderWidget();
    }

    function renderWidget() {
      const container = document.getElementById('widget');
      
      if (!currentMeeting) {
        container.innerHTML = `
          <div class="widget-header">
            <div class="teams-logo">${teamsLogoSvg}</div>
            <div class="header-text">
              <div class="header-title">Teams</div>
              <div class="header-subtitle">Meetings</div>
            </div>
          </div>
          <div class="user-mode-toggle">
            <button class="mode-btn ${userMode === 'driver' ? 'active' : ''}" onclick="setUserMode('driver')">
              ${driverIconSvg}
              Driver
            </button>
            <button class="mode-btn ${userMode === 'passenger' ? 'active' : ''}" onclick="setUserMode('passenger')">
              ${passengerIconSvg}
              Passenger
            </button>
          </div>
          <div class="empty-state">
            <div class="empty-icon">${calendarIconSvg}</div>
            <div class="empty-title">No upcoming meetings</div>
            <div class="empty-subtitle">Your calendar is clear</div>
          </div>
        `;
        return;
      }

      const isMock = currentMeeting._isMock;
      const isMoving = vehicleSpeed > 5;
      const media = getMediaCapabilities();
      const hasJoinUrl = currentMeeting.onlineMeeting?.joinUrl;
      const timeInfo = formatTime(currentMeeting.start);
      const countdown = getTimeUntil(currentMeeting.start);
      const joinUrl = currentMeeting.onlineMeeting?.joinUrl || '#';

      container.innerHTML = `
        <div class="widget-header">
          <div class="teams-logo">${teamsLogoSvg}</div>
          <div class="header-text">
            <div class="header-title">Next Meeting</div>
            <div class="header-subtitle">Microsoft Teams</div>
          </div>
          <span class="status-pill ${isMock ? 'demo' : ''}">
            ${isMock ? 'Demo' : 'Live'}
          </span>
        </div>

        <div class="user-mode-toggle">
          <button class="mode-btn ${userMode === 'driver' ? 'active' : ''}" onclick="setUserMode('driver')">
            ${driverIconSvg}
            Driver
          </button>
          <button class="mode-btn ${userMode === 'passenger' ? 'active' : ''}" onclick="setUserMode('passenger')">
            ${passengerIconSvg}
            Passenger
          </button>
        </div>

        <div class="meeting-content">
          <div class="meeting-subject">${currentMeeting.subject || 'Team Meeting'}</div>
          
          <div class="meeting-details">
            <div class="detail-row">
              <span class="time-highlight">${timeInfo.time}</span>
              <span class="time-period">${timeInfo.period}</span>
            </div>
            ${countdown ? `<div class="countdown">Starts in <span class="countdown-value">${countdown}</span></div>` : ''}
            ${currentMeeting.organizer?.name ? `
              <div class="detail-row">
                ${userIconSvg}
                <span>${currentMeeting.organizer.name}</span>
              </div>
            ` : ''}
          </div>

          <div class="vehicle-indicator ${isMoving ? 'moving' : ''}">
            <div class="indicator-dot"></div>
            <span class="indicator-text">${isMoving ? 'Vehicle in motion' : 'Vehicle parked'}</span>
            <span class="indicator-speed">${vehicleSpeed.toFixed(0)} km/h</span>
          </div>

          <div class="media-mode">
            <div class="media-icon ${media.video ? 'active' : ''}">
              ${videoIconSvg}
              Video ${media.video ? 'ON' : 'OFF'}
            </div>
            <div class="media-icon ${media.audio ? 'active' : ''}">
              ${audioIconSvg}
              Audio ${media.audio ? 'ON' : 'OFF'}
            </div>
          </div>

          <div class="join-buttons">
            ${media.video && hasJoinUrl ? `
              <a href="${joinUrl}" target="_blank" rel="noopener noreferrer" class="join-btn">
                ${videoIconSvg}
                Join with Video
              </a>
            ` : ''}
            ${media.audio && hasJoinUrl ? `
              <a href="${joinUrl}" target="_blank" rel="noopener noreferrer" class="join-btn ${!media.video ? '' : 'audio-only'}">
                ${audioIconSvg}
                ${media.video ? 'Audio Only' : 'Join Audio'}
              </a>
            ` : ''}
            ${!hasJoinUrl ? `
              <button class="join-btn disabled" disabled>
                ${videoIconSvg}
                No Join Link
              </button>
            ` : ''}
          </div>
        </div>
      `;
    }

    // Configurable signals (overridable via widget options).
    let SPEED_SIGNAL = 'Vehicle.Speed';
    let LIGHTS_SIGNAL = 'Vehicle.Body.Lights.Beam.Low.IsOn';

    window.onWidgetLoaded = async function (options) {
      try {
        if (options) {
          if (options.speedSignal) SPEED_SIGNAL = options.speedSignal;
          if (options.lightsSignal) LIGHTS_SIGNAL = options.lightsSignal;
        }
        try {
          const v = (typeof getApiValue === 'function') ? getApiValue(SPEED_SIGNAL) : undefined;
          if (v !== undefined && v !== null) vehicleSpeed = parseFloat(v) || 0;
        } catch (e) {}
        currentMeeting = await fetchMeeting();
        renderWidget();
      } catch (error) {
        console.error('Widget load error:', error);
      }
    };

    window.onVssSync = function (data) {
      // Vehicle speed (sensor)
      if (data[SPEED_SIGNAL] !== undefined) {
        vehicleSpeed = parseFloat(data[SPEED_SIGNAL]) || 0;
        renderWidget();
      }
      // Low Beam Light ON = MOVING (60 km/h), OFF = PARKED (0 km/h)
      // (treated as an actuator-style trigger here)
      if (data[LIGHTS_SIGNAL] !== undefined) {
        const lightsOn = data[LIGHTS_SIGNAL];
        vehicleSpeed = (lightsOn === true || lightsOn === 'true' || lightsOn === 1) ? 60 : 0;
        renderWidget();
      }
    };

    setTimeout(async () => {
      if (!currentMeeting) {
        currentMeeting = await fetchMeeting();
        renderWidget();
      }
    }, 500);
  </script>
</body>
</html>
