<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Widget</title>
  <link rel="icon" href="./favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../tailwind.min.css">
  <script defer src="../syncer.js"></script>
  <style>
    @font-face {
      font-family: 'Manrope';
      src: url('../Manrope-VariableFont.ttf') format('truetype');
      font-weight: 100 900;
      font-display: swap;
    }

    body {
      font-family: 'Manrope', sans-serif;
    }

    .font-medium {
      font-weight: 500;
    }
  </style>
</head>

<body class="bg-slate-800 text-white flex flex-col h-screen w-screen">
  <div class="font-bold text-sm bg-slate-900 px-2 py-1 flex items-center hover:underline">
    Terminal
    <div class="grow"></div>
    <button id='btn-clear' class="text-sm hover:text-gray-300">Clear</button>
  </div>
  <div class="grow overflow-y-auto text-white text-xs font-mono px-2 py-1">
    <pre id="container" class="whitespace-pre-wrap"></pre>
    <div id="bottom"></div>
  </div>
  <script>
    let logs = ""
    
    // Initialize elements immediately
    const container = document.getElementById('container')
    const bottom = document.getElementById('bottom')
    const btnClear = document.getElementById('btn-clear')
    
    const appendLog = (log) => {
      if (!log) return;
      logs += log + (log.endsWith('\r\n') ? '' : '\r\n')
      if (container) {
        container.innerText = logs
        if (bottom) bottom.scrollIntoView()
      }
    }
    
    const clearLog = () => {
      logs = ""
      if (container) {
        container.innerText = logs
      }
    }
    
    // Set up clear button
    if (btnClear) {
      btnClear.onclick = clearLog
    }

    // Called by syncer.js when widget options are received
    const onWidgetLoaded = (options) => {
      // Widget is ready
    }

    // Handle app log messages from syncer.js
    window.onAppLog = function(log) {
      appendLog(log)
    }
  </script>
</body>

</html>
