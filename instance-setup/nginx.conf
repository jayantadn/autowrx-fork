events {
    worker_connections 1024;
}

http {
    upstream backend {
        server autowrx:3200;
    }

    server {
        listen 80;
        server_name 52.186.172.193;

        # Frontend SPA
        location / {
            proxy_pass http://backend;
            proxy_set_header Host $http_host;
            proxy_intercept_errors off;
        }

        # Built-in widgets
        location /builtin-widgets {
            alias /usr/src/playground-be/static/builtin-widgets;
            index index.html;
        }

        # API
        location /v2 {
            proxy_pass http://backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static files
        location /static {
            proxy_pass http://backend;
            proxy_set_header Host $http_host;
        }
        
        location /imgs {
            proxy_pass http://backend;
            proxy_set_header Host $http_host;
        }
        
        location /css {
            proxy_pass http://backend;
            proxy_set_header Host $http_host;
        }
        
        location /plugin {
            proxy_pass http://backend;
            proxy_set_header Host $http_host;
        }
    }
}
